<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — FaceAttend</title>
  <meta name="description" content="Reset your FaceAttend account password.">

  <!-- Bootstrap 5.3 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts Inter -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <!-- Local CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/spatial.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    /* ── Forgot Password Page Specific Styles ── */
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      overflow: hidden;
    }

    .spatial-ambient-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(175,82,222,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 70% 60%, rgba(0,122,255,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 70% 55% at 50% 85%, rgba(255,149,0,0.08) 0%, transparent 50%),
        linear-gradient(135deg, #f5f7fa 0%, #e8ecf4 50%, #f0f2f5 100%);
      animation: ambientShift 20s ease-in-out infinite alternate;
    }

    @keyframes ambientShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      50%  { filter: hue-rotate(12deg) brightness(1.02); }
      100% { filter: hue-rotate(-8deg) brightness(1.01); }
    }

    .reset-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .reset-card {
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      background: rgba(255, 255, 255, 0.52);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-top-color: rgba(255, 255, 255, 0.40);
      border-left-color: rgba(255, 255, 255, 0.30);
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.08),
        0 8px 24px rgba(0, 0, 0, 0.05),
        0 2px 8px rgba(0, 0, 0, 0.03),
        inset 0 1px 0 rgba(255, 255, 255, 0.50);
      animation: cardEntrance 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .reset-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .reset-brand i {
      font-size: 2.8rem;
      color: #007AFF;
      display: block;
      margin-bottom: 10px;
    }

    .reset-brand span {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.01em;
    }

    .reset-heading {
      text-align: center;
      margin-bottom: 32px;
    }

    .reset-heading h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 6px;
    }

    .reset-heading p {
      font-size: 0.95rem;
      color: #6e6e73;
      margin: 0;
    }

    /* ── Flash Toasts ── */
    .reset-toast-container {
      margin-bottom: 24px;
    }

    .reset-toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
      animation: toastSlide 0.4s ease;
    }

    .reset-toast.toast-success {
      background: rgba(52, 199, 89, 0.12);
      color: #248a3d;
      border: 1px solid rgba(52, 199, 89, 0.2);
    }

    .reset-toast.toast-danger,
    .reset-toast.toast-error {
      background: rgba(255, 59, 48, 0.12);
      color: #d70015;
      border: 1px solid rgba(255, 59, 48, 0.2);
    }

    .reset-toast.toast-warning {
      background: rgba(255, 149, 0, 0.12);
      color: #c93400;
      border: 1px solid rgba(255, 149, 0, 0.2);
    }

    .reset-toast.toast-info {
      background: rgba(0, 122, 255, 0.10);
      color: #0055d4;
      border: 1px solid rgba(0, 122, 255, 0.18);
    }

    @keyframes toastSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Input Groups ── */
    .input-group-spatial {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group-spatial .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #aeaeb2;
      font-size: 1.1rem;
      z-index: 2;
      transition: color 0.3s ease;
      pointer-events: none;
    }

    .input-group-spatial .spatial-input {
      width: 100%;
      padding: 14px 18px 14px 46px;
      border-radius: 16px;
      border: 1.5px solid rgba(0, 0, 0, 0.06);
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: #1d1d1f;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group-spatial .spatial-input::placeholder {
      color: #aeaeb2;
    }

    .input-group-spatial .spatial-input:focus {
      border-color: #007AFF;
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12);
    }

    .input-group-spatial .spatial-input:focus + .input-icon,
    .input-group-spatial:focus-within .input-icon {
      color: #007AFF;
    }

    /* ── Submit Button ── */
    .reset-btn {
      width: 100%;
      padding: 14px 32px;
      border-radius: 50px;
      background: #007AFF;
      color: #fff;
      font-weight: 600;
      font-size: 1.05rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(0, 122, 255, 0.30);
      font-family: 'Inter', sans-serif;
    }

    .reset-btn:hover {
      background: #0066d6;
      transform: scale(1.02);
      box-shadow: 0 8px 28px rgba(0, 122, 255, 0.40);
    }

    .reset-btn:active {
      transform: scale(0.98);
    }

    /* ── Footer Link ── */
    .reset-footer {
      text-align: center;
      margin-top: 20px;
    }

    .reset-footer a {
      font-size: 0.9rem;
      color: #007AFF;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .reset-footer a:hover {
      opacity: 0.75;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .reset-card {
        padding: 36px 24px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <!-- Ambient Background -->
  <div class="spatial-ambient-bg"></div>

  <!-- Reset Password Card -->
  <div class="reset-wrapper">
    <div class="reset-card">
      <!-- Brand -->
      <div class="reset-brand">
        <i class="bi bi-person-bounding-box"></i>
        <span>FaceAttend</span>
      </div>

      <!-- Heading -->
      <div class="reset-heading">
        <h2>Reset Password</h2>
        <p>Enter your details to reset</p>
      </div>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="reset-toast-container">
            {% for category, message in messages %}
              <div class="reset-toast toast-{{ category }}">
                <i class="bi {% if category == 'success' %}bi-check-circle-fill{% elif category == 'danger' or category == 'error' %}bi-exclamation-circle-fill{% elif category == 'warning' %}bi-exclamation-triangle-fill{% else %}bi-info-circle-fill{% endif %}"></i>
                <span>{{ message }}</span>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <!-- Reset Form -->
      <form action="{{ url_for('main.forgot_password') }}" method="POST" id="forgotPasswordForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Email -->
        <div class="input-group-spatial">
          <input type="email" class="spatial-input" id="resetEmail" name="email" placeholder="Email address" required autocomplete="email">
          <i class="bi bi-envelope input-icon"></i>
        </div>

        <!-- New Password -->
        <div class="input-group-spatial">
          <input type="password" class="spatial-input" id="resetNewPassword" name="new_password" placeholder="New password" required autocomplete="new-password">
          <i class="bi bi-lock input-icon"></i>
        </div>

        <!-- Confirm Password -->
        <div class="input-group-spatial">
          <input type="password" class="spatial-input" id="resetConfirmPassword" name="confirm_password" placeholder="Confirm password" required autocomplete="new-password">
          <i class="bi bi-lock-fill input-icon"></i>
        </div>

        <!-- Submit -->
        <button type="submit" class="reset-btn" id="resetSubmitBtn">Reset Password</button>
      </form>

      <!-- Footer -->
      <div class="reset-footer">
        <a href="/login"><i class="bi bi-arrow-left-short"></i> Back to Login</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
