services:
  - type: web
    name: face-attendance-system
    runtime: python
    buildCommand: |
      export CMAKE_BUILD_PARALLEL_LEVEL=1
      export MAX_JOBS=1
      pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: face-attendance-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: face-attendance-db
    plan: free
    databaseName: face_attendance
